<!DOCTYPE svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d27"/>
    </linearGradient>
    <linearGradient id="boxBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="boxGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="boxOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="boxRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="boxPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">hermes-telemetry — Plugin Architecture</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">Observability + Budget Guardrails for Hermes Agent</text>

  <!-- ===== LEFT COLUMN: Hook Pipeline ===== -->
  <rect x="20" y="80" width="260" height="420" rx="8" fill="#1e2433" stroke="#2d3748" stroke-width="1"/>
  <text x="150" y="105" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">HOOK PIPELINE</text>

  <!-- Hook boxes -->
  <rect x="35" y="120" width="230" height="32" rx="6" fill="url(#boxBlue)"/>
  <text x="150" y="141" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11" font-weight="600">on_session_start</text>

  <rect x="35" y="162" width="230" height="32" rx="6" fill="url(#boxBlue)"/>
  <text x="150" y="183" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11" font-weight="600">pre_api_request</text>

  <rect x="35" y="204" width="230" height="32" rx="6" fill="url(#boxGreen)"/>
  <text x="150" y="225" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11" font-weight="600">post_api_request ★</text>

  <rect x="35" y="246" width="230" height="32" rx="6" fill="url(#boxGreen)"/>
  <text x="150" y="267" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11" font-weight="600">post_tool_call</text>

  <rect x="35" y="288" width="230" height="32" rx="6" fill="url(#boxGreen)"/>
  <text x="150" y="309" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11" font-weight="600">subagent_stop</text>

  <rect x="35" y="330" width="230" height="32" rx="6" fill="url(#boxOrange)"/>
  <text x="150" y="351" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11" font-weight="600">pre_llm_call (budget)</text>

  <rect x="35" y="372" width="230" height="32" rx="6" fill="url(#boxRed)"/>
  <text x="150" y="393" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11" font-weight="600">pre_tool_call (gate)</text>

  <rect x="35" y="414" width="230" height="32" rx="6" fill="url(#boxBlue)"/>
  <text x="150" y="435" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11" font-weight="600">on_session_end</text>

  <rect x="35" y="456" width="230" height="32" rx="6" fill="url(#boxBlue)"/>
  <text x="150" y="477" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11" font-weight="600">on_session_finalize</text>

  <!-- Legend -->
  <rect x="35" y="500" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="52" y="510" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">lifecycle</text>
  <rect x="105" y="500" width="12" height="12" rx="2" fill="#059669"/>
  <text x="122" y="510" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">capture</text>
  <rect x="175" y="500" width="12" height="12" rx="2" fill="#d97706"/>
  <text x="192" y="510" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">soft</text>
  <rect x="235" y="500" width="12" height="12" rx="2" fill="#dc2626"/>
  <text x="252" y="510" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">hard</text>

  <!-- ===== CENTER: Data Flow ===== -->
  <rect x="310" y="80" width="260" height="420" rx="8" fill="#1e2433" stroke="#2d3748" stroke-width="1"/>
  <text x="440" y="105" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">DATA FLOW</text>

  <!-- SQLite box -->
  <rect x="330" y="130" width="220" height="80" rx="8" fill="#0c0f1a" stroke="#2563eb" stroke-width="1.5"/>
  <text x="440" y="155" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="12" font-weight="700">telemetry.db</text>
  <text x="440" y="175" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">SQLite WAL · schema v3</text>
  <text x="440" y="195" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">runs · llm_calls · tool_calls</text>

  <!-- pricing.yaml -->
  <rect x="330" y="235" width="220" height="50" rx="6" fill="#0c0f1a" stroke="#059669" stroke-width="1.5"/>
  <text x="440" y="255" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="11" font-weight="700">pricing.yaml</text>
  <text x="440" y="273" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">USD per 1M tokens</text>

  <!-- budget.yaml -->
  <rect x="330" y="300" width="220" height="50" rx="6" fill="#0c0f1a" stroke="#d97706" stroke-width="1.5"/>
  <text x="440" y="320" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="700">budget.yaml</text>
  <text x="440" y="338" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">daily / monthly limits</text>

  <!-- Enforcement box -->
  <rect x="330" y="375" width="220" height="110" rx="8" fill="#0c0f1a" stroke="#dc2626" stroke-width="1.5"/>
  <text x="440" y="400" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="12" font-weight="700">Enforcement</text>
  <text x="440" y="422" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">soft · warning at 80%</text>
  <text x="440" y="440" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">hard · tool block at 100%</text>
  <text x="440" y="458" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">cron · pause_job</text>

  <!-- Arrow: hooks → db -->
  <line x1="265" y1="220" x2="325" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: db → enforcement -->
  <line x1="440" y1="215" x2="440" y2="370" stroke="#475569" stroke-width="1.5"/>

  <!-- ===== RIGHT COLUMN: Commands & Metrics ===== -->
  <rect x="600" y="80" width="280" height="420" rx="8" fill="#1e2433" stroke="#2d3748" stroke-width="1"/>
  <text x="740" y="105" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">SLASH COMMANDS &amp; METRICS</text>

  <!-- /stats box -->
  <rect x="615" y="125" width="250" height="160" rx="6" fill="#0c0f1a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="740" y="150" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="14" font-weight="700">/stats</text>
  <text x="740" y="172" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">Sessions · Tokens · Cost</text>
  <text x="740" y="190" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">Top tools · Latency</text>
  <line x1="625" y1="205" x2="855" y2="205" stroke="#2d3748" stroke-width="1"/>
  <text x="740" y="222" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">/stats cron week</text>
  <text x="740" y="222" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">/stats cron week</text>
  <text x="740" y="222" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">/stats cron week</text>
  <text x="740" y="222" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">/stats cron week</text>

