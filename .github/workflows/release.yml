name: Release
on:
  push:
    tags:
      - "v*.*.*"
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"; TAG="${TAG#v}"
          PYVER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG  pyproject=$PYVER"
          if [ "$TAG" != "$PYVER" ]; then
            echo "::error::tag $TAG ≠ pyproject $PYVER"
            exit 1
          fi
          echo "Version OK: $PYVER"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          draft: false