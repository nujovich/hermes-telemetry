name: Release
on:
  push:
    tags:
      - "v*.*.*"
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"; TAG="${TAG#v}"
          PYVER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG  pyproject=$PYVER"
          if [ "$TAG" != "$PYVER" ]; then
            echo "::error::tag $TAG ≠ pyproject $PYVER"
            exit 1
          fi
          echo "Version OK: $PYVER"
      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"; VERSION="${VERSION#v}"
          python - "$VERSION" <<'PY' > release-notes.md
          import re
          import sys

          version = sys.argv[1]
          text = open("CHANGELOG.md", encoding="utf-8").read()
          # Capture everything under "## [VERSION] ..." up to the next "## [" header.
          pattern = rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)"
          m = re.search(pattern, text, re.DOTALL | re.MULTILINE)
          if not m or not m.group(1).strip():
              sys.exit(f"::error::no CHANGELOG.md section found for {version}")
          print(m.group(1).strip())
          PY
          echo "----- release notes -----"
          cat release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: false
          draft: false
