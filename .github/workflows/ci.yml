name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Lint — ruff (format + check)
  # -----------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: JS bundle syntax (plugin IIFE)
        run: node --check dashboard/dist/index.js

      - name: Version sync — pyproject ↔ __init__ ↔ plugin.yaml ↔ manifest.json
        run: |
          python - <<'PY'
          import json, pathlib, re, sys, tomllib

          root = pathlib.Path(".")
          pyver = tomllib.load(open(root / "pyproject.toml", "rb"))["project"]["version"]
          init  = re.search(r'^__version__\s*=\s*"([^"]+)"',
                            (root / "__init__.py").read_text(), re.M).group(1)
          plug  = re.search(r'^version:\s*"?([\d.]+)"?',
                            (root / "plugin.yaml").read_text(), re.M).group(1)
          manif = json.loads((root / "dashboard" / "manifest.json").read_text())["version"]

          versions = {"pyproject": pyver, "__init__": init,
                      "plugin.yaml": plug, "dashboard/manifest.json": manif}
          unique = set(versions.values())
          if len(unique) != 1:
              for k, v in versions.items():
                  print(f"  {k}: {v}")
              sys.exit("::error::version drift across files")
          print(f"Version OK: {pyver}")
          PY

  # -----------------------------------------------------------------------
  # Tests — pytest on Python 3.8–3.12
  # -----------------------------------------------------------------------
  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pyyaml

      - name: Run tests
        run: pytest tests/ -v --tb=short
