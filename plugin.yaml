name: hermes-telemetry
version: "0.1.0"
description: >-
  Observability for Hermes Agent — tokens, cost, latency, tool calls per session
  and cron job. Persists to local SQLite. Exposes /stats slash command.
author: nujovich
kind: standalone
hooks:
  - on_session_start
  - post_api_request
  - post_tool_call
  - post_llm_call
  - on_session_end
  - on_session_finalize
  - subagent_stop
  - pre_llm_call
