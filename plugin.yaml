name: hermes-telemetry
version: "0.5.1"
description: >-
  Observability + budget guardrails for Hermes Agent — tokens, cost, latency,
  tool calls per session and cron job. Persists to local SQLite. Exposes /stats
  and /budget slash commands.
author: nujovich
kind: standalone
provides_hooks:
  - on_session_start
  - pre_api_request
  - post_api_request
  - post_tool_call
  - post_llm_call
  - on_session_end
  - on_session_finalize
  - subagent_stop
  - pre_llm_call
  - pre_tool_call
