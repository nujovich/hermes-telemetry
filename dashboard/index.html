<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hermes-telemetry dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #c9d1d9; min-height: 100vh; }
  .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .header-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .header h1 { font-size: 18px; font-weight: 600; color: #e6edf3; }
  .header h1 span { color: #58a6ff; }
  .page-tabs { display: flex; gap: 10px; align-items: center; }
  .page-tab { background: #21262d; color: #c9d1d9; border: 1px solid #3d444d; border-radius: 999px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 700; letter-spacing: 0.2px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
  .page-tab:hover { background: #30363d; border-color: #58a6ff; }
  .page-tab.active { color: #ffffff; border-color: #58a6ff; background: linear-gradient(180deg, #1f6feb 0%, #1a4f9c 100%); box-shadow: 0 0 0 1px rgba(88,166,255,0.25), 0 6px 16px rgba(31,111,235,0.18); }
  .page-title { font-size: 18px; font-weight: 600; color: #e6edf3; margin-bottom: 18px; }
  .header .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .header select { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
  .header select:focus { outline: none; border-color: #58a6ff; }
  .header .refresh-btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  .header .refresh-btn:hover { background: #30363d; }
  .header-label { color: #8b949e; font-size: 12px; }
  .load-status { min-width: 92px; color: #8b949e; font-size: 12px; text-align: right; }
  .load-status.is-loading { color: #58a6ff; }
  .load-status.is-error { color: #f85149; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* stat cards */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; text-align: center; }
  .stat-card .value { font-size: 22px; font-weight: 700; color: #e6edf3; }
  .stat-card .label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
  .stat-card.green .value { color: #3fb950; }
  .stat-card.red .value { color: #f85149; }
  .stat-card.blue .value { color: #58a6ff; }
  .stat-card.yellow .value { color: #d29922; }
  .stat-card.purple .value { color: #bc8cff; }

  /* budget bar */
  .budget-bar { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
  .budget-bar h3 { font-size: 13px; color: #8b949e; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .budget-item { margin-bottom: 10px; }
  .budget-item .info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .budget-item .bar-bg { background: #21262d; border-radius: 4px; height: 8px; overflow: hidden; }
  .budget-item .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .bar-fill.ok { background: #3fb950; }
  .bar-fill.soft { background: #d29922; }
  .bar-fill.hard { background: #f85149; }
  .budget-disabled { color: #8b949e; font-size: 13px; }

  .budget-item { display: flex; flex-direction: column; gap: 8px; }
  .budget-item .info { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .budget-item .info span:first-child { text-align: left; }
  .budget-item .info span:last-of-type { flex: 0 0 auto; text-align: right; }
  .budget-edit-btn { background: #21262d; color: #58a6ff; border: 1px solid #30363d; border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; margin-left: 12px; white-space: nowrap; }
  .budget-edit-btn:hover { background: #30363d; }

  /* Budget modal */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 99999; }
  .modal-overlay.open { display: flex !important; }
  .modal { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 24px; width: 100%; max-width: 400px; margin: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .modal h3 { color: #e6edf3; margin-bottom: 16px; font-size: 16px; }
  .modal .form-group { margin-bottom: 16px; }
  .modal label { display: block; color: #8b949e; font-size: 12px; margin-bottom: 4px; }
  .modal select, .modal input { width: 100%; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; font-size: 13px; box-sizing: border-box; }
  .modal select:focus, .modal input:focus { outline: none; border-color: #58a6ff; }
  .modal .form-row { display: flex; gap: 8px; }
  .modal .form-row .form-group { flex: 1; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }
  .modal-btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid #30363d; }
  .modal-btn.cancel { background: #21262d; color: #c9d1d9; }
  .modal-btn.cancel:hover { background: #30363d; }
  .modal-btn.save { background: #238636; color: #fff; }
  .modal-btn.save:hover { background: #2ea043; }
  .modal-error { color: #f85149; font-size: 12px; margin-top: 8px; display: none; }
  .modal-error.show { display: block; }

  /* charts */
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
  .chart-card h3 { font-size: 14px; color: #e6edf3; margin-bottom: 16px; }
  .chart-card canvas { max-height: 250px; }

  /* tables */
  .table-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 24px; overflow-x: auto; }
  .table-card h3 { font-size: 14px; color: #e6edf3; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: #8b949e; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; padding: 8px 12px; border-bottom: 1px solid #30363d; }
  td { padding: 8px 12px; border-bottom: 1px solid #21262d; color: #c9d1d9; }
  tr:hover td { background: #1c2128; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.ok { background: #23863633; color: #3fb950; }
  .badge.error { background: #da363333; color: #f85149; }
  .badge.running { background: #6e40c933; color: #bc8cff; }
  .badge.cron { background: #388bfd33; color: #58a6ff; }
  .badge.cli { background: #8b949e33; color: #8b949e; }

  .text-right { text-align: right; }
  .text-muted { color: #8b949e; }

  @media (max-width: 768px) {
    .chart-row { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .loading { text-align: center; padding: 60px; color: #8b949e; }
  .loading-shell { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 22px; color: #8b949e; }
  .loading-title { color: #e6edf3; font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .loading-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 18px; }
  .skeleton { height: 76px; border-radius: 8px; background: linear-gradient(90deg, #161b22 0%, #21262d 45%, #161b22 90%); border: 1px solid #30363d; background-size: 240% 100%; animation: shimmer 1.4s linear infinite; }
  .skeleton.wide { height: 180px; grid-column: span 2; }
  @keyframes shimmer { from { background-position: 120% 0; } to { background-position: -120% 0; } }
  .error-box { background: #da363333; border: 1px solid #f85149; color: #f85149; padding: 16px; border-radius: 8px; margin: 24px 0; }
  .table-actions { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 12px; color: #8b949e; font-size: 12px; }
  .pager { display: flex; align-items: center; gap: 8px; }
  .pager-btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
  .pager-btn:hover { background: #30363d; }
  .pager-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .full-width-chart { margin-bottom: 24px; }
  .full-width-chart canvas { max-height: 420px; min-height: 420px; }
  .svg-chart-host { height: 420px; width: 100%; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; color: #8b949e; font-size: 12px; }
  .chart-legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .chart-legend-swatch { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
  .clickable-row { cursor: pointer; }
  .clickable-row:hover td { background: #202833; }
  .subtle-note { color: #8b949e; font-size: 12px; margin-top: 10px; }
  .insight-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .insight-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 14px; }
  .insight-card .label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .insight-card .value { color: #e6edf3; font-size: 20px; font-weight: 700; }
  .filter-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 14px; }
  .filter-bar-left { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .chip-list { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .filter-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; background: #1f2937; border: 1px solid #364152; color: #e6edf3; font-size: 12px; font-weight: 600; }
  .chip-close { background: transparent; border: 0; color: #8b949e; cursor: pointer; font-size: 13px; line-height: 1; padding: 0; }
  .chip-close:hover { color: #e6edf3; }
  .inline-btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 12px; }
  .inline-btn:hover { background: #30363d; }
  .search-inline { display: flex; align-items: center; gap: 8px; }
  .search-inline input { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 10px; font-size: 12px; min-width: 220px; }
  .search-inline input:focus { outline: none; border-color: #58a6ff; }
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); display: none; justify-content: flex-end; z-index: 100000; }
  .drawer-overlay.open { display: flex !important; }
  .drawer { width: min(760px, 100vw); height: 100vh; overflow-y: auto; background: #0f1117; border-left: 1px solid #30363d; box-shadow: -12px 0 30px rgba(0,0,0,0.35); padding: 20px; }
  .drawer-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
  .drawer-title { font-size: 18px; font-weight: 700; color: #e6edf3; }
  .drawer-subtitle { color: #8b949e; font-size: 12px; margin-top: 4px; word-break: break-all; }
  .drawer-close { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 10px; cursor: pointer; }
  .drawer-section { margin-bottom: 24px; }
  .drawer-section h4 { font-size: 13px; color: #e6edf3; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>hermes-<span>telemetry</span></h1>
    <div class="page-tabs">
      <button id="tab-home" class="page-tab active" onclick="switchPage('home')">Home</button>
      <button id="tab-breakdown" class="page-tab" onclick="switchPage('breakdown')">Breakdown</button>
    </div>
  </div>
  <div class="actions">
    <select id="windowSelect" onchange="loadAll({showShell:true})">
      <option value="24">Last 24h</option>
      <option value="168">Last 7 days</option>
      <option value="720">Last 30 days</option>
      <option value="2160">Last 90 days</option>
      <option value="0" selected>All time</option>
    </select>
    <span class="header-label">Auto</span>
    <select id="autoRefreshSelect" onchange="setAutoRefresh(this.value)">
      <option value="0">Off</option>
      <option value="5000">5s</option>
      <option value="10000">10s</option>
      <option value="20000">20s</option>
      <option value="60000">1min</option>
    </select>
    <button class="refresh-btn" onclick="loadAll({showShell:false})">&#x21bb; Refresh</button>
    <span id="loadStatus" class="load-status">Idle</span>
  </div>
</div>

<div class="container" id="app">
  <div class="loading-shell">
    <div class="loading-title">Loading telemetry dashboard…</div>
    <div>Reading SQLite telemetry, budgets, charts, and session filters. Large all-time ranges can take a few seconds.</div>
    <div class="loading-grid">
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton wide"></div><div class="skeleton wide"></div>
    </div>
  </div>
</div>

<!-- Budget Modal -->
<div class="modal-overlay" id="budgetModal" onclick="if(event.target===this) closeBudgetModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Edit Budget</h3>
    <div class="form-group">
      <label>Scope</label>
      <select id="budgetScope">
        <option value="global">Global</option>
        <option value="per_cron_job">Per Cron Job (default)</option>
        <option value="per_sender">Per Sender</option>
      </select>
    </div>
    <div class="form-group">
      <label>Window</label>
      <select id="budgetWindow">
        <option value="daily">Daily</option>
        <option value="monthly">Monthly</option>
      </select>
    </div>
    <div class="form-group">
      <label>Limit (USD)</label>
      <input type="number" id="budgetLimit" step="0.01" min="0" placeholder="e.g. 5.00">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Soft threshold (%) <span class="text-muted" style="font-size:10px;font-weight:400">(applies to all scopes)</span></label>
        <input type="number" id="budgetSoftPct" step="0.01" min="0" max="1" placeholder="0.80">
      </div>
      <div class="form-group">
        <label>Hard threshold (%) <span class="text-muted" style="font-size:10px;font-weight:400">(applies to all scopes)</span></label>
        <input type="number" id="budgetHardPct" step="0.01" min="0" max="1" placeholder="1.00">
      </div>
    </div>
    <div class="form-group">
      <label>On estimated data</label>
      <select id="budgetOnEstimated">
        <option value="warn_only">Warn only (degrade hard to soft)</option>
        <option value="enforce">Enforce hard limits</option>
      </select>
    </div>
    <div class="modal-error" id="budgetModalError"></div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeBudgetModal()">Cancel</button>
      <button class="modal-btn save" onclick="saveBudget()">Save</button>
    </div>
  </div>
</div>

<div class="drawer-overlay" id="sessionDrawer" onclick="if(event.target===this) closeSessionDetail()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-header">
      <div>
        <div class="drawer-title" id="sessionDrawerTitle">Session detail</div>
        <div class="drawer-subtitle" id="sessionDrawerSubtitle"></div>
      </div>
      <button class="drawer-close" onclick="closeSessionDetail()">Close</button>
    </div>
    <div id="sessionDrawerBody" class="text-muted">Loading…</div>
  </div>
</div>

<script>
const API = '';
let charts = {};
let currentDailyTokensPage = 1;
let lastWindowHours = null;
let currentPage = 'home';
let currentDrilldown = {};
let autoRefreshTimer = null;
let isLoading = false;
let latestLoadRequestId = 0;
let latestDrawerRequestId = 0;

function $(sel) { return document.querySelector(sel); }
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function nf(n) { return n == null ? '—' : Number(n).toLocaleString(); }
function fmtCost(v) { return v == null ? '$0.00' : '$' + Number(v).toFixed(4); }
function fmtMs(v) {
  if (v == null) return '—';
  const ms = Number(v);
  if (ms >= 60000) return (ms/60000).toFixed(1) + 'm';
  if (ms >= 1000) return (ms/1000).toFixed(1) + 's';
  return Math.round(ms) + 'ms';
}
function loadingShell() {
  return `<div class="loading-shell">
    <div class="loading-title">Loading telemetry dashboard…</div>
    <div>Reading SQLite telemetry, budget data, charts, and session filters. Keeping this visible so slow loads don't look broken.</div>
    <div class="loading-grid">
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton wide"></div><div class="skeleton wide"></div>
    </div>
  </div>`;
}
function setLoadStatus(text, state = '') {
  const el = $('#loadStatus');
  if (!el) return;
  el.textContent = text;
  const statusState = state ? `is-${state}` : '';
  el.className = `load-status ${statusState}`.trim();
}
function autoLabel(ms) {
  if (!Number(ms)) return 'Auto off';
  if (Number(ms) >= 60000) return `Auto ${Number(ms) / 60000}min`;
  return `Auto ${Number(ms) / 1000}s`;
}
function setAutoRefresh(value) {
  const ms = Number(value || 0);
  localStorage.setItem('telemetryAutoRefreshMs', String(ms));
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = null;
  const select = $('#autoRefreshSelect');
  if (select) select.value = String(ms);
  setLoadStatus(ms ? autoLabel(ms) : 'Auto off');
  if (ms) {
    autoRefreshTimer = setInterval(() => loadAll({showShell:false, reason:'auto'}), ms);
  }
}
function initAutoRefresh() {
  const saved = localStorage.getItem('telemetryAutoRefreshMs') || '20000';
  const allowed = new Set(['0', '5000', '10000', '20000', '60000']);
  const ms = allowed.has(saved) ? saved : '20000';
  setAutoRefresh(ms);
}
function badge(v, map) {
  const cls = map[v] || 'cli';
  return `<span class="badge ${cls}">${escHtml(v || '—')}</span>`;
}
const statusBadge = v => badge(v, { ok: 'ok', error: 'error', interrupted: 'error', running: 'running' });
const platformBadge = v => badge(v || 'cli', { cron: 'cron', cli: 'cli', telegram: 'cli', discord: 'cli' });

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

function renderStatCard(id, value, label, cls) {
  return `<div class="stat-card ${cls}"><div class="value">${value}</div><div class="label">${label}</div></div>`;
}

// Budget modal functions
let currentBudgetScope = 'global';

async function openBudgetModal(scope) {
  // Parse "global/daily" -> scope="global", window="daily"
  const [parsedScope, parsedWindow] = scope.split('/');
  const actualScope = parsedScope || scope;
  const actualWindow = parsedWindow || 'daily';

  currentBudgetScope = actualScope;

  // Open modal FIRST (synchronous, works even if fetch fails)
  $('#budgetModal').classList.add('open');

  // Reset fields immediately - no waiting
  $('#budgetScope').value = actualScope;
  $('#budgetWindow').value = actualWindow;
  $('#budgetLimit').value = '';
  $('#budgetSoftPct').value = '';
  $('#budgetHardPct').value = '';
  $('#budgetOnEstimated').value = 'warn_only';
  $('#budgetModalError').classList.remove('show');
  $('#budgetModalError').textContent = '';

  // Then fetch details for pre-fill (async, non-blocking)
  try {
    const res = await fetch(`/api/budget/detail?scope=${encodeURIComponent(actualScope)}&window=${encodeURIComponent(actualWindow)}`);
    const data = await res.json();
    if (!data.error) {
      $('#budgetWindow').value = data.window || actualWindow;
      $('#budgetLimit').value = data.limit_usd !== null && data.limit_usd !== undefined ? data.limit_usd : '';
      $('#budgetSoftPct').value = data.soft_pct !== undefined ? data.soft_pct : '';
      $('#budgetHardPct').value = data.hard_pct !== undefined ? data.hard_pct : '';
      $('#budgetOnEstimated').value = data.on_estimated_mode || 'warn_only';
    }
  } catch {
    // Keep defaults on network error - modal already open with empty fields
  }
}

function closeBudgetModal() {
  $('#budgetModal').classList.remove('open');
}

async function saveBudget() {
  // Helper: parse float, return undefined if empty/whitespace
  const parseOptFloat = (v) => {
    const s = v.trim();
    return s === '' ? undefined : parseFloat(s);
  };

  const payload = {
    scope: $('#budgetScope').value,
    window: $('#budgetWindow').value,
    limit_usd: parseOptFloat($('#budgetLimit').value),
    soft_pct: parseOptFloat($('#budgetSoftPct').value),
    hard_pct: parseOptFloat($('#budgetHardPct').value),
    on_estimated_mode: $('#budgetOnEstimated').value
  };

  if (payload.limit_usd === undefined || isNaN(payload.limit_usd)) {
    showModalError('Limit (USD) is required');
    return;
  }

  $('#budgetModalError').classList.remove('show');

  try {
    const response = await fetch('/api/budget', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await response.json();
    if (result.error) {
      showModalError(result.error);
      return;
    }
    closeBudgetModal();
    loadAll({showShell:false}); // refresh dashboard
  } catch (err) {
    showModalError('Request failed: ' + err.message);
  }
}

function renderBudget(data) {
  if (!data.enabled) return '<div class="budget-bar"><h3>Budgets</h3><div class="budget-disabled">No budget.yaml configured. Create ~/.hermes/telemetry/budget.yaml</div></div>';
  const items = data.budgets || [];
  if (!items.length) return '<div class="budget-bar"><h3>Budgets</h3><div class="budget-disabled">No budget limits defined</div></div>';
  let html = '<div class="budget-bar"><h3>Budgets</h3>';
  for (const s of items) {
    const cls = s.level;
    const label = escHtml(s.scope);
    // Use single quotes in onclick to avoid JSON.stringify double-quote escaping issues
    const safeScope = s.scope.replace(/'/g, "\\'");
    html += `<div class="budget-item">
      <div class="info"><span>${label}</span><span>${fmtCost(s.spent)} / ${fmtCost(s.limit)} (${s.pct}%)</span><button class="budget-edit-btn" onclick="openBudgetModal('${safeScope}')">Edit</button></div>
      <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${Math.min(s.pct, 100)}%"></div></div>

  html += `<div class="budget-disabled" style="margin-top:8px">on_estimated: ${data.on_estimated}</div></div>`;

function renderTokenBreakdown(data) {

function hasDrilldown() {
  return !!(currentDrilldown.day || currentDrilldown.model || currentDrilldown.provider || currentDrilldown.platform || currentDrilldown.status || currentDrilldown.cron_job_id || currentDrilldown.q);
}

function drilldownLabel() {
  const parts = [];
  if (currentDrilldown.day) parts.push(`Day: ${currentDrilldown.day}`);
  if (currentDrilldown.model) parts.push(`Model: ${currentDrilldown.model}`);
  if (currentDrilldown.provider) parts.push(`Provider: ${currentDrilldown.provider}`);
  if (currentDrilldown.platform) parts.push(`Platform: ${currentDrilldown.platform}`);
  if (currentDrilldown.status) parts.push(`Status: ${currentDrilldown.status}`);
  if (currentDrilldown.cron_job_id) parts.push(`Cron: ${currentDrilldown.cron_job_id}`);
  if (currentDrilldown.q) parts.push(`Search: ${currentDrilldown.q}`);
  return parts.join(' · ');
}

function removeDrilldownKey(key) {
  const next = { ...currentDrilldown };
  delete next[key];
  currentDrilldown = next;
  loadAll({showShell:false});
}

function renderFilterChips() {
  const defs = [
    ['provider', 'Provider'],
    ['model', 'Model'],
    ['day', 'Day'],
    ['status', 'Status'],
    ['platform', 'Platform'],
    ['cron_job_id', 'Cron'],
    ['q', 'Search'],
  ];
  const chips = defs
    .filter(([key]) => currentDrilldown[key])
    .map(([key, label]) => `<span class="filter-chip">${escHtml(label)}: ${escHtml(currentDrilldown[key])}<button class="chip-close" title="Remove ${escHtml(label)} filter" onclick="removeDrilldownKey('${key}')">×</button></span>`)
    .join('');
  return chips ? `<div class="chip-list">${chips}</div>` : '';
}

function setDrilldown(filter) {
  currentDrilldown = { ...(filter || {}) };
  Object.keys(currentDrilldown).forEach(key => {
    if (currentDrilldown[key] == null || currentDrilldown[key] === '') delete currentDrilldown[key];
  });
  currentPage = 'breakdown';
  $('#tab-home')?.classList.toggle('active', false);
  $('#tab-breakdown')?.classList.toggle('active', true);
  loadAll({showShell:false});
}

function addDrilldown(filter) {
  setDrilldown({ ...currentDrilldown, ...(filter || {}) });
}

function clearDrilldown() {
  currentDrilldown = {};
  loadAll({showShell:false});
}

function applyInvestigationSearch() {
  const value = document.getElementById('investigationSearch')?.value?.trim() || '';
  if (value) setDrilldown({ ...currentDrilldown, q: value });
  else {
    const next = { ...currentDrilldown };
    delete next.q;
    currentDrilldown = next;
    loadAll({showShell:false});
  }
}

function clearInvestigationSearch() {
  const input = document.getElementById('investigationSearch');
  if (input) input.value = '';
  const next = { ...currentDrilldown };
  delete next.q;
  currentDrilldown = next;
  loadAll({showShell:false});
}

function buildRunsQuery(hours, limit = 30) {
  const qs = new URLSearchParams({ hours: String(hours), limit: String(limit) });
  for (const [key, value] of Object.entries(currentDrilldown)) {
    if (value != null && value !== '') qs.set(key, value);
  }
  return qs.toString();
}

  let toolRows = '<div class="drawer-section"><h4>Tool calls</h4><table><thead><tr><th>Time</th><th>Tool</th><th>Status</th><th>Latency</th></tr></thead><tbody>';
  for (const row of (data.tool_calls || [])) {
    toolRows += `<tr><td class="text-muted">${escHtml((row.ts || '').substring(0, 19))}</td><td>${escHtml(row.tool_name || '—')}</td><td>${row.ok ? statusBadge('ok') : statusBadge('error')}</td><td>${fmtMs(row.latency_ms)}</td></tr>`;
  }
  toolRows += '</tbody></table></div>';
  html += toolRows;
  return html;
}

async function openSessionDetail(sessionId) {
  if (!sessionId) return;
  const requestId = ++latestDrawerRequestId;
  $('#sessionDrawerTitle').textContent = 'Session detail';
  $('#sessionDrawerSubtitle').textContent = sessionId;
  $('#sessionDrawerBody').innerHTML = '<div class="loading" style="padding:24px">Loading…</div>';
  $('#sessionDrawer')?.classList.add('open');
  try {
    const data = await fetchJSON(`/api/session-detail?session_id=${encodeURIComponent(sessionId)}`);
    if (requestId !== latestDrawerRequestId) return;
    $('#sessionDrawerTitle').textContent = `Session detail · ${data?.run?.platform || 'session'}`;
    $('#sessionDrawerSubtitle').textContent = sessionId;
    $('#sessionDrawerBody').innerHTML = renderSessionDetail(data);
  } catch (err) {
    if (requestId !== latestDrawerRequestId) return;
    $('#sessionDrawerBody').innerHTML = `<div class="error-box">Failed to load session detail: ${escHtml(err.message)}</div>`;
  }
}

function drawLineChart(canvasId, labels, datasets, yLabel) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId).getContext('2d');
  charts[canvasId] = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#8b949e', font: { size: 11 } }, grid: { color: '#21262d' } },
        y: { ticks: { color: '#8b949e', font: { size: 11 } }, grid: { color: '#21262d' }, title: { display: !!yLabel, text: yLabel, color: '#8b949e' } },
      },
    },
  });
}

function drawStackedBarChart(canvasId, labels, datasets, yLabel) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId).getContext('2d');
  charts[canvasId] = new Chart(ctx, {
    type: 'bar',

function drawDoughnutChart(canvasId, labels, data, colors, onSliceClick) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId).getContext('2d');
  charts[canvasId] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: data, backgroundColor: colors, borderWidth: 0 }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      onClick: (_, elements, chart) => {
        if (!elements?.length || !onSliceClick) return;
        const idx = elements[0].index;
        onSliceClick(chart.data.labels[idx], idx);
      },
      plugins: { legend: { position: 'right', labels: { color: '#8b949e', font: { size: 11 }, padding: 12 } } },
    },
  });
}

function renderDailyCombinedSvg(hostId, dailyTokenChart, dailyModelChart) {
  const host = document.getElementById(hostId);
  if (!host) return;
  const rows = dailyTokenChart || [];
  const modelRowsByDay = Object.fromEntries((dailyModelChart?.rows || []).map(r => [r.day, r]));
  const modelNames = dailyModelChart?.models || [];
  const modelColors = ['#bc8cff', '#8b949e', '#58a6ff', '#3fb950', '#d29922', '#f85149'];
  const tokenSeries = [
    { label: 'Input', color: '#58a6ff', key: 'tokens_in' },
    { label: 'Output', color: '#3fb950', key: 'tokens_out' },
    { label: 'Cache Read', color: '#d29922', key: 'cache_read_tokens' },
    { label: 'Reasoning', color: '#f85149', key: 'reasoning_tokens' },
  ];
  const legendItems = [
    ...tokenSeries.map(s => ({ label: s.label, color: s.color })),
    ...modelNames.map((m, i) => ({ label: `Model: ${(m || '—').replace(/^openrouter\//, '').substring(0, 18)}`, color: modelColors[i % modelColors.length] })),
  ];
  if ((dailyModelChart?.rows || []).some(r => (r.other || 0) > 0)) legendItems.push({ label: 'Model: Other', color: '#8b949e' });

  if (!rows.length) {
    host.innerHTML = '<div class="text-muted">No chart data.</div>';
    return;
  }

  const width = Math.max(900, host.clientWidth || 900);
  const height = 420;
  const pad = { top: 18, right: 24, bottom: 50, left: 70 };
  const plotW = width - pad.left - pad.right;
  const plotH = height - pad.top - pad.bottom;
  const maxY = Math.max(...rows.map(r => Math.max(
    (r.tokens_in || 0) + (r.tokens_out || 0) + (r.cache_read_tokens || 0) + (r.reasoning_tokens || 0),
    Object.values(modelRowsByDay[r.day]?.models || {}).reduce((a, b) => a + b, 0) + (modelRowsByDay[r.day]?.other || 0)
  )), 1);
  const ticks = 6;
  const groupW = plotW / rows.length;
  const barW = Math.max(10, Math.min(56, groupW * 0.22));
  const leftX = i => pad.left + groupW * i + (groupW / 2) - barW;
  const rightX = i => pad.left + groupW * i + (groupW / 2);
  const y = v => pad.top + plotH - (v / maxY) * plotH;

  let svg = `<div class="chart-legend">${legendItems.map(item => `<span class="chart-legend-item"><span class="chart-legend-swatch" style="background:${item.color}"></span>${escHtml(item.label)}</span>`).join('')}</div>`;
  svg += `<svg width="100%" height="${height}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">`;

  for (let i = 0; i <= ticks; i++) {
    const val = maxY * (i / ticks);
    const yy = pad.top + plotH - (plotH * i / ticks);
    svg += `<line x1="${pad.left}" y1="${yy}" x2="${width - pad.right}" y2="${yy}" stroke="#21262d" stroke-width="1" />`;
    svg += `<text x="${pad.left - 10}" y="${yy + 4}" text-anchor="end" fill="#8b949e" font-size="11">${nf(Math.round(val))}</text>`;
  }

  rows.forEach((row, i) => {
    const dayJs = JSON.stringify(row.day);
    let acc = 0;
    for (const s of tokenSeries) {
      const v = row[s.key] || 0;
      if (!v) continue;
      const h = (v / maxY) * plotH;
      const yy = y(acc + v);
      svg += `<rect x="${leftX(i)}" y="${yy}" width="${barW}" height="${h}" fill="${s.color}" style="cursor:pointer" onclick='addDrilldown({day:${dayJs}})'><title>${row.day} · ${s.label}: ${nf(v)}</title></rect>`;
      acc += v;
    }

    acc = 0;
    modelNames.forEach((model, idx) => {
      const v = modelRowsByDay[row.day]?.models?.[model] || 0;
      if (!v) return;
      const h = (v / maxY) * plotH;
      const yy = y(acc + v);
      svg += `<rect x="${rightX(i)}" y="${yy}" width="${barW}" height="${h}" fill="${modelColors[idx % modelColors.length]}" style="cursor:pointer" onclick='addDrilldown({day:${dayJs},model:${JSON.stringify(model)}})'><title>${row.day} · Model: ${escHtml(model)}: ${nf(v)}</title></rect>`;
      acc += v;
    });
    const other = modelRowsByDay[row.day]?.other || 0;
    if (other) {
      const h = (other / maxY) * plotH;
      const yy = y(acc + other);
      svg += `<rect x="${rightX(i)}" y="${yy}" width="${barW}" height="${h}" fill="#8b949e" style="cursor:pointer" onclick='addDrilldown({day:${dayJs}})'><title>${row.day} · Model: Other: ${nf(other)}</title></rect>`;
    }

    svg += `<text x="${pad.left + groupW * i + groupW/2}" y="${height - 16}" text-anchor="middle" fill="#8b949e" font-size="11">${row.day}</text>`;
  });

  svg += `<text x="20" y="${pad.top + plotH / 2}" fill="#8b949e" font-size="12" transform="rotate(-90 20 ${pad.top + plotH / 2})">Tokens</text>`;
  svg += `</svg>`;
  host.innerHTML = svg;
}

async function loadAll(options = {}) {
  if (isLoading && options.reason === 'auto') return;
  const requestId = ++latestLoadRequestId;
  isLoading = true;
  const showShell = options.showShell ?? !$('#app')?.dataset?.loaded;
  const app = $('#app');
  const hours = $('#windowSelect').value;
  if (hours !== lastWindowHours) {
    currentDailyTokensPage = 1;
    lastWindowHours = hours;
  }
  setLoadStatus(options.reason === 'auto' ? 'Auto loading…' : 'Loading…', 'loading');
  const startedAt = performance.now();
  if (showShell || !app.dataset.loaded) app.innerHTML = loadingShell();

  try {
    const chartHours = hours === '0' ? 2160 : Number(hours);
    const [summary, cron, providers, runsData, budget, tokenBreakdown, modelTokens, dailyTokens, dailyTokenChart, dailyModelChart, cacheEfficiency] = await Promise.all([
      fetchJSON(`/api/summary?hours=${hours}`),
      fetchJSON(`/api/cron?hours=${hours}`),
      fetchJSON(`/api/providers?hours=${hours}`),
      fetchJSON(`/api/runs?limit=30&hours=${hours}`),
      fetchJSON('/api/budget'),
      fetchJSON(`/api/token-breakdown?hours=${hours}`),
      fetchJSON(`/api/model-tokens?hours=${hours}&limit=100`),
      fetchJSON(`/api/daily-tokens?hours=${hours}&page=${currentDailyTokensPage}&per_page=15`),
      fetchJSON(`/api/daily-token-chart?hours=${chartHours}&limit_days=90`),
      fetchJSON(`/api/daily-model-chart?hours=${chartHours}&limit_days=90&top_n=5`),
      fetchJSON(`/api/cache-efficiency?hours=${hours}`),
    ]);
    if (requestId !== latestLoadRequestId) return;

    const r = summary.runs || {};
    const l = summary.llm || {};
    const runs = runsData?.rows || [];
    const investigationRuns = await fetchJSON(`/api/runs?${buildRunsQuery(hours, 40)}`);
    if (requestId !== latestLoadRequestId) return;
    currentDailyTokensPage = dailyTokens?.page || 1;

    let html = `<div class="page-title">${currentPage === 'home' ? 'Home' : 'Breakdown'}</div>`;

    if (currentPage === 'home') {
      // --- stat cards ---
      html += '<div class="stat-grid">';
      html += renderStatCard('sessions', nf(r.total_runs), 'Sessions', 'blue');
      html += renderStatCard('ok', nf(r.ok_runs), 'OK', 'green');
      html += renderStatCard('failed', nf(r.failed_runs), 'Failed', 'red');
      html += renderStatCard('api', nf(l.api_calls), 'API Calls', 'purple');
      html += renderStatCard('tokens', nf(r.tokens_in), 'Tokens In', '');
      html += renderStatCard('cost', fmtCost(r.cost_usd), 'Cost', 'yellow');
      html += '</div>';

      // --- budget ---
      html += renderBudget(budget);

      // --- charts row 1: daily cost + top tools ---
      let dailyTitle;
      switch (hours) {
        case '24': dailyTitle = 'Daily Cost (last 24h)'; break;
        case '168': dailyTitle = 'Daily Cost (last 7 days)'; break;
        case '720': dailyTitle = 'Daily Cost (last 30 days)'; break;
        case '2160': dailyTitle = 'Daily Cost (last 90 days)'; break;
        case '0': dailyTitle = 'Daily Cost (all time)'; break;
        default: dailyTitle = 'Daily Cost';
      }
      html += '<div class="chart-row">';
      html += renderChartCard('dailyCost', dailyTitle, 'chart-daily');
      html += renderChartCard('topTools', 'Top Tools by Calls', 'chart-tools');
      html += '</div>';

      // --- charts row 2: cron cost + providers ---
      html += '<div class="chart-row">';
      html += renderChartCard('cronCost', 'Cost by Cron Job', 'chart-cron');
      html += renderChartCard('providers', 'Provider Distribution', 'chart-providers');
      html += '</div>';
      html += '<div style="font-size:11px;color:#8b949e;margin-top:-16px;margin-bottom:24px;padding:0 4px">';
      html += '<b>Provider key:</b> <code>openrouter</code> = model with <code>openrouter/</code> prefix · <code>nous</code> = model without prefix (direct to Nous Research) · <code>anthropic</code> = direct to Anthropic';
      html += '</div>';

      // --- cron table ---
      if (cron.length) {
        let t = '<table><thead><tr><th>Job ID</th><th>Runs</th><th>OK</th><th>Fail</th><th>In</th><th>Out</th><th>Cache</th><th>Cost</th><th>Avg Dur</th><th>Last Run</th></tr></thead><tbody>';
        for (const row of cron) {
          const jid = (row.cron_job_id || '?').substring(0, 20);
          const last = (row.last_run || '').substring(0, 16);
          t += `<tr class="clickable-row" onclick='addDrilldown({cron_job_id:${JSON.stringify(row.cron_job_id || '')},platform:"cron"})'><td><code>${jid}</code></td><td>${nf(row.runs)}</td><td>${nf(row.ok_runs)}</td><td>${nf(row.failed_runs)}</td><td>${nf(row.tokens_in)}</td><td>${nf(row.tokens_out)}</td><td>${nf(row.cache_read_tokens || 0)}</td><td>${fmtCost(row.cost_usd)}</td><td>${fmtMs(row.avg_duration_ms)}</td><td class="text-muted">${last}</td></tr>`;
        }
        t += '</tbody></table><div class="subtle-note">Click a cron job row to inspect sessions from that job.</div>';
        html += renderTableCard('cronTable', 'Cron Jobs', t);
      }

      // --- runs table ---
      let t = '<table><thead><tr><th>Time</th><th>Platform</th><th>Cron Job</th><th>Model</th><th>Status</th><th>In</th><th>Out</th><th>Cache</th><th>Cost</th><th>Duration</th><th>Session ID</th></tr></thead><tbody>';
      for (const row of runs) {
        const time = (row.started_at || '').substring(0, 16);
        const sid = (row.session_id || '').substring(0, 24);
        const model = (row.model || '—').substring(0, 20);
        const platform = row.platform || 'cli';
        const status = row.status || '—';
        const cronShort = (row.cron_job_id || '—').substring(0, 16);
        t += `<tr class="clickable-row" onclick='openSessionDetail(${JSON.stringify(row.session_id || '')})'><td class="text-muted">${escHtml(time)}</td><td><span onclick='event.stopPropagation(); addDrilldown({platform:${JSON.stringify(platform)}})'>${platformBadge(platform)}</span></td><td class="text-muted">${row.cron_job_id ? `<span class="inline-btn" onclick='event.stopPropagation(); addDrilldown({cron_job_id:${JSON.stringify(row.cron_job_id || '')}})'>${escHtml(cronShort)}</span>` : '—'}</td><td class="text-muted" title="${escHtml(row.model || '—')}">${escHtml(model)}</td><td><span onclick='event.stopPropagation(); addDrilldown({status:${JSON.stringify(status)}})'>${statusBadge(status)}</span></td><td>${nf(row.tokens_in)}</td><td>${nf(row.tokens_out)}</td><td>${nf(row.cache_read_tokens || 0)}</td><td>${fmtCost(row.cost_usd)}</td><td>${fmtMs(row.duration_ms)}</td><td><code title="${escHtml(row.session_id || '')}">${escHtml(sid)}</code></td></tr>`;
      }
      t += '</tbody></table><div class="subtle-note">Click platform, cron job, or status for a filtered breakdown view. Click row for full session detail.</div>';
      html += renderTableCard('runsTable', 'Recent Sessions', t);
    } else {
      if (tokenBreakdown && tokenBreakdown.total_tokens > 0) {
        html += renderTokenBreakdown(tokenBreakdown);
      }
      html += renderProviderBreakdownTable(providers);
      html += renderCacheEfficiency(cacheEfficiency);
      html += renderModelTokensTable(modelTokens);
      html += renderDailyTokensTable(dailyTokens);
      html += renderWideSvgCard(hours === '0' ? 'Daily Token + Model Breakdown (last 90 days)' : 'Daily Token + Model Breakdown', 'daily-combined-svg');
      html += renderRunsInvestigation(investigationRuns, hasDrilldown() ? 'Session Investigation' : 'Investigation Workspace');
    }

    if (requestId !== latestLoadRequestId) return;
    app.innerHTML = html;
    app.dataset.loaded = '1';
    const elapsed = ((performance.now() - startedAt) / 1000).toFixed(1);
    const autoMs = Number($('#autoRefreshSelect')?.value || 0);
    setLoadStatus(`Loaded ${elapsed}s${autoMs ? ` · ${autoLabel(autoMs)}` : ''}`);

    // --- render charts (after DOM is ready) ---
    if (currentPage === 'home') {
      const dc = summary.daily_cost || [];
      drawLineChart('chart-daily', dc.map(d => d.day), [{
        label: 'Cost ($)', data: dc.map(d => d.cost),
        borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.15)', fill: true, tension: 0.3, pointRadius: 4,
      }], 'USD');

      const tools = (summary.top_tools || []).slice(0, 8);
      drawBarChart('chart-tools', tools.map(t => t.tool_name.split('_').pop().substring(0, 12)), tools.map(t => t.calls), '#3fb950', 'Calls');

      if (cron.length) {
        drawBarChart('chart-cron', cron.map(c => (c.cron_job_id || '?').substring(0, 16)), cron.map(c => c.cost_usd), '#bc8cff', 'Cost ($)');
      }

      if (providers.length) {
        const colors = ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff', '#8b949e'];
        drawDoughnutChart(
          'chart-providers',
          providers.map(p => p.provider || '(unknown)'),
          providers.map(p => p.total_calls),
          colors,
          (label) => addDrilldown({ provider: label === '(unknown)' ? '—' : label })
        );

      }
    } else {
      renderDailyCombinedSvg('daily-combined-svg', dailyTokenChart, dailyModelChart);
    }

  } catch (err) {
    if (requestId !== latestLoadRequestId) return;
    app.innerHTML = `<div class="error-box">Error loading data: ${err.message}<br><br>Make sure the dashboard server is running and telemetry DB exists.</div>`;
    setLoadStatus('Load error', 'error');
  } finally {
    if (requestId === latestLoadRequestId) isLoading = false;
  }
}

// initial load + configurable auto-refresh
initAutoRefresh();
loadAll({showShell:true});
</script>
